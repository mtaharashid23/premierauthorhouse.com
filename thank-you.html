<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Premier Author House</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --primary-color: #f49834; }
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .thank-you-card { text-align: center; padding: 40px; background: #fff; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--primary-color); }
        .thank-you-card h1 { color: var(--primary-color); font-weight: bold; }
        .btn-home { background: var(--primary-color); color: white; border: none; padding: 10px 25px; border-radius: 5px; text-decoration: none; margin-top: 20px; display: inline-block; }
        .btn-home:hover { background: #e38a2a; color: white; }
    </style>
</head>
<body>

<div class="thank-you-card">
    <div style="font-size: 60px; color: var(--primary-color);">✓</div>
    <h1>THANK YOU!</h1>
    <p>Your request has been received. Our team from <strong>Premier Author House</strong> will contact you shortly.</p>
    <a href="index.html" class="btn-home">Back to Home</a>
</div>

</body>
</html>
